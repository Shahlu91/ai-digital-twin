HOBBIES & INTERESTS:
- Sports: Real Madrid & BVB fan, Tennis, Squash, Padel
- Travel: Karakorum (Pakistan), Seoul (South Korea) - loves exploring new cultures
- Strategy: Chess player

AVAILABILITY & EXPECTATIONS:
- Notice Period: 2 months
- Salary Expectation: €130k-€160k OTE
- Location: Vienna, Austria (open to office-based roles in DACH)
- Ideal Role: Scale-up or Enterprise SaaS, AE/Senior AE, DACH focus, growth opportunity

CONTACT:
- Email: shahzaibmian@icloud.com
- LinkedIn: linkedin.com/in/shahzaib-mian

RED FLAGS (what to avoid):
- Purely transactional roles without relationship-building
- No 5+ year growth perspective
- Unclear career progression paths`;

    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [showWelcome, setShowWelcome] = useState(true);
      const [messageCount, setMessageCount] = useState(0);
      const messagesEndRef = useRef(null);

      const suggestedQuestions = [
        "Give me short introduction.",
        "When are you available?",
        "What are your salary expectations?",
        "What are you most proud of?",
        "Tell me more about you as a person."
      ];

      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      };

      useEffect(() => {
        scrollToBottom();
      }, [messages]);

      const sendMessage = async (text) => {
        if (!text.trim() || loading) return;

        setShowWelcome(false);
        const userMessage = { role: 'user', content: text };
        setMessages(prev => [...prev, userMessage]);
        setInput('');
        setLoading(true);
        setMessageCount(prev => prev + 1);

        try {
          const conversationHistory = messages.map(msg => ({
            role: msg.role,
            content: msg.content
          }));

          // Call Vercel Function instead of Anthropic API directly
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              system: SYSTEM_PROMPT,
              messages: [...conversationHistory, { role: 'user', content: text }]
            })
          });

          if (!response.ok) {
            throw new Error(`API Error: ${response.status}`);
          }

          const data = await response.json();
          const assistantMessage = {
            role: 'assistant',
            content: data.content[0].text
          };

          setMessages(prev => [...prev, assistantMessage]);
        } catch (error) {
          console.error('Error:', error);
          setMessages(prev => [...prev, {
            role: 'assistant',
            content: 'Sorry, I encountered an error. Please try again.',
            isError: true
          }]);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{
          minHeight: '100vh',
          display: 'flex',
          flexDirection: 'column',
          fontFamily: "'Inter', sans-serif",
          backgroundColor: '#ffffff'
        }}>
          <div style={{
            backgroundColor: '#ffffff',
            borderBottom: '1px solid #e5e7eb',
            padding: '1rem 1.5rem',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between'
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '1rem' }}>
              <img 
                src={PHOTO_DATA_URI}
                alt="Shahzaib Mian"
                style={{
                  width: '60px',
                  height: '60px',
                  borderRadius: '50%',
                  objectFit: 'cover',
                  border: '2px solid #1a5fb4'
                }}
              />
              <div>
                <h1 style={{
                  margin: 0,
                  fontSize: '1.5rem',
                  fontFamily: "'Fraunces', serif",
                  fontWeight: 700,
                  color: '#1a5fb4'
                }}>Shahzaib Mian</h1>
                <p style={{ margin: 0, fontSize: '0.875rem', color: '#6b7280' }}>
                  AI Digital Twin
                </p>
              </div>
            </div>
            <div style={{ display: 'flex', gap: '0.75rem' }}>
              <a 
                href="https://www.linkedin.com/in/shahzaib-mian/"
                target="_blank"
                rel="noopener noreferrer"
                style={{
                  padding: '0.5rem 1rem',
                  backgroundColor: '#1a5fb4',
                  color: 'white',
                  textDecoration: 'none',
                  borderRadius: '6px',
                  fontSize: '0.875rem',
                  fontWeight: 500
                }}
              >
                🔗 LinkedIn
              </a>
              <a 
                href="mailto:shahzaibmian@icloud.com"
                style={{
                  padding: '0.5rem 1rem',
                  backgroundColor: '#f3f4f6',
                  color: '#1f2937',
                  textDecoration: 'none',
                  borderRadius: '6px',
                  fontSize: '0.875rem',
                  fontWeight: 500
                }}
              >
                📧 Email
              </a>
            </div>
          </div>

          <div style={{
            flex: 1,
            overflowY: 'auto',
            padding: '2rem 1.5rem',
            maxWidth: '800px',
            width: '100%',
            margin: '0 auto'
          }}>
            {showWelcome && (
              <div style={{
                textAlign: 'center',
                marginBottom: '2rem'
              }}>
                <img 
                  src={PHOTO_DATA_URI}
                  alt="Shahzaib Mian"
                  style={{
                    width: '120px',
                    height: '120px',
                    borderRadius: '50%',
                    objectFit: 'cover',
                    marginBottom: '1.5rem',
                    border: '3px solid #1a5fb4'
                  }}
                />
                <h2 style={{
                  fontSize: '1.875rem',
                  fontFamily: "'Fraunces', serif",
                  fontWeight: 700,
                  color: '#1a5fb4',
                  marginBottom: '0.5rem'
                }}>
                  Hi, I'm Shahzaib!
                </h2>
                <p style={{
                  fontSize: '1rem',
                  color: '#6b7280',
                  marginBottom: '2rem'
                }}>
                  Ask me anything about my professional background
                </p>

                <div style={{
                  display: 'flex',
                  flexWrap: 'wrap',
                  gap: '0.75rem',
                  justifyContent: 'center',
                  marginTop: '1.5rem'
                }}>
                  {suggestedQuestions.map((q, i) => (
                    <button
                      key={i}
                      onClick={() => sendMessage(q)}
                      style={{
                        padding: '0.75rem 1.25rem',
                        backgroundColor: '#f3f4f6',
                        border: '1px solid #d1d5db',
                        borderRadius: '999px',
                        fontSize: '0.875rem',
                        color: '#374151',
                        cursor: 'pointer',
                        transition: 'all 0.2s'
                      }}
                      onMouseOver={(e) => {
                        e.target.style.backgroundColor = '#e5e7eb';
                        e.target.style.borderColor = '#1a5fb4';
                      }}
                      onMouseOut={(e) => {
                        e.target.style.backgroundColor = '#f3f4f6';
                        e.target.style.borderColor = '#d1d5db';
                      }}
                    >
                      {q}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {messages.map((msg, idx) => (
              <div key={idx} style={{
                marginBottom: '1.5rem',
                display: 'flex',
                flexDirection: msg.role === 'user' ? 'row-reverse' : 'row',
                gap: '0.75rem'
              }}>
                <div style={{
                  padding: '1rem 1.25rem',
                  borderRadius: '1rem',
                  maxWidth: '80%',
                  backgroundColor: msg.role === 'user' ? '#1a5fb4' : '#f3f4f6',
                  color: msg.role === 'user' ? 'white' : '#1f2937',
                  fontSize: '0.9375rem',
                  lineHeight: '1.6',
                  whiteSpace: 'pre-wrap'
                }}>
                  {msg.content}
                </div>
              </div>
            ))}

            {loading && (
              <div style={{ padding: '1rem', color: '#6b7280', fontSize: '0.875rem' }}>
                Thinking...
              </div>
            )}

            {messageCount >= 4 && (
              <div style={{
                marginTop: '2rem',
                padding: '1.5rem',
                backgroundColor: '#eff6ff',
                border: '2px solid #1a5fb4',
                borderRadius: '12px',
                textAlign: 'center'
              }}>
                <h3 style={{
                  fontSize: '1.125rem',
                  fontWeight: 600,
                  color: '#1a5fb4',
                  marginBottom: '0.5rem'
                }}>
                  Let's connect!
                </h3>
                <p style={{ fontSize: '0.875rem', color: '#6b7280', marginBottom: '1rem' }}>
                  Want to dive deeper? Reach out directly:
                </p>
                <div style={{ display: 'flex', gap: '0.75rem', justifyContent: 'center' }}>
                  <a 
                    href="https://www.linkedin.com/in/shahzaib-mian/"
                    target="_blank"
                    rel="noopener noreferrer"
                    style={{
                      padding: '0.5rem 1rem',
                      backgroundColor: '#1a5fb4',
                      color: 'white',
                      textDecoration: 'none',
                      borderRadius: '6px',
                      fontSize: '0.875rem',
                      fontWeight: 500
                    }}
                  >
                    LinkedIn
                  </a>
                  <a 
                    href="mailto:shahzaibmian@icloud.com"
                    style={{
                      padding: '0.5rem 1rem',
                      backgroundColor: 'white',
                      color: '#1a5fb4',
                      textDecoration: 'none',
                      borderRadius: '6px',
                      fontSize: '0.875rem',
                      fontWeight: 500,
                      border: '1px solid #1a5fb4'
                    }}
                  >
                    Email
                  </a>
                </div>
              </div>
            )}

            <div ref={messagesEndRef} />
          </div>

          <div style={{
            borderTop: '1px solid #e5e7eb',
            padding: '1.5rem',
            backgroundColor: '#ffffff'
          }}>
            <div style={{
              maxWidth: '800px',
              margin: '0 auto',
              display: 'flex',
              gap: '0.75rem'
            }}>
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                onKeyPress={(e) => e.key === 'Enter' && sendMessage(input)}
                placeholder="Ask me anything about my experience..."
                disabled={loading}
                style={{
                  flex: 1,
                  padding: '0.75rem 1rem',
                  border: '1px solid #d1d5db',
                  borderRadius: '8px',
                  fontSize: '0.9375rem',
                  outline: 'none'
                }}
              />
              <button
                onClick={() => sendMessage(input)}
                disabled={!input.trim() || loading}
                style={{
                  padding: '0.75rem 2rem',
                  backgroundColor: input.trim() && !loading ? '#1a5fb4' : '#d1d5db',
                  color: 'white',
                  border: 'none',
                  borderRadius: '8px',
                  fontSize: '0.9375rem',
                  fontWeight: 500,
                  cursor: input.trim() && !loading ? 'pointer' : 'not-allowed'
                }}
              >
                Send
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
  </style>
</body>
</html>
